name: libgbemu CI

on: [push]

env:
  CMAKE_VER: 4.4.0
  NINJA_VER: 1.11.1
  LLVM_VER_WIN: 21.1.0

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.preset }})
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev_ninja_clang_tidy_coverage
          - dev_ninja_msvc_analysis

    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: ${{ env.CMAKE_VER }}

      - name: CMake version
        run: cmake --version

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: ${{ env.NINJA_VER }}

      - name: Install LLVM
        run: |
          choco install llvm --version=$env:LLVM_VER_WIN --allow-downgrade
          clang-format --version
          clang-tidy --version

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run Tests
        run: ctest --preset ${{ matrix.preset }}

      - name: Check Formatting
        run: cmake --build --preset ${{ matrix.preset }} --target clang-format-check

      - name: Check CMake Formatting
        run: cmake --build --preset ${{ matrix.preset }} --target cmake-format-check

      - name: Generate Coverage Report
        if: matrix.preset == 'dev_ninja_clang_tidy_coverage'
        run: cmake --build --preset ${{ matrix.preset }} --target generate-coverage-report

      - name: Upload Coverage to Codecov
        if: matrix.preset == 'dev_ninja_clang_tidy_coverage'
        uses: codecov/codecov-action@v5
        with:
          files: builds/dev_ninja_clang_tidy_coverage/build/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  build_and_test_linux:
    name: Build and Test (dev_ninja_gcc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: ${{ env.CMAKE_VER }}

      - name: CMake version
        run: cmake --version

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: ${{ env.NINJA_VER }}

      - name: Install GCC 15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-15 g++-15 clang-format
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100
          g++ --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Configure
        run: cmake --preset dev_ninja_gcc

      - name: Build
        run: cmake --build --preset dev_ninja_gcc

      - name: Run Tests
        run: ctest --preset dev_ninja_gcc

      - name: Check Formatting
        run: cmake --build --preset dev_ninja_gcc --target clang-format-check

      - name: Check CMake Formatting
        run: cmake --build --preset dev_ninja_gcc --target cmake-format-check
