name: libgbemu CI

on: [push]

env:
  CMAKE_VER: 4.4.0
  NINJA_VER: 1.11.1
  LLVM_VER_WIN: 22.1.7
  LLVM_VER_UBUNTU: 22
  GCC_VER: 16
  MSVC_VER: 14.51

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.preset }})
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev_ninja_clang_tidy_coverage
          - dev_ninja_msvc_analysis

    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: ${{ env.CMAKE_VER }}

      - name: CMake version
        run: cmake --version

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: ${{ env.NINJA_VER }}

      - name: Install LLVM
        run: |
          choco install llvm --version=$env:LLVM_VER_WIN --allow-downgrade
          clang-format --version
          clang-tidy --version

      - name: Update MSVC
        run: |
          Invoke-WebRequest -URI https://aka.ms/vs/stable/vs_buildtools.exe -OutFile vs_buildtools.exe
          $process = Start-Process -FilePath vs_buildtools.exe -ArgumentList "--installPath", "$pwd\VSBuildTools", "--passive", "--wait","--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64" -Wait -PassThru
          Write-Output $process.ExitCode

      - name: Setup MSVC dev environment
        uses: TheMrMilchmann/setup-msvc-dev@v2
        with:
          arch: x64
          toolset: ${{ env.MSVC_VER }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run Tests
        run: ctest --preset ${{ matrix.preset }}

      - name: Check Formatting
        run: cmake --build --preset ${{ matrix.preset }} --target clang-format-check

      - name: Check CMake Formatting
        run: cmake --build --preset ${{ matrix.preset }} --target cmake-format-check

      - name: Generate Coverage Report
        if: matrix.preset == 'dev_ninja_clang_tidy_coverage'
        run: cmake --build --preset ${{ matrix.preset }} --target generate-coverage-report

      - name: Upload Coverage to Codecov
        if: matrix.preset == 'dev_ninja_clang_tidy_coverage'
        uses: codecov/codecov-action@v5
        with:
          files: builds/dev_ninja_clang_tidy_coverage/build/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  build_and_test_linux:
    name: Build and Test (${{ matrix.preset }})
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev_ninja_gcc
          - release_ninja_gcc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: ${{ env.CMAKE_VER }}

      - name: CMake version
        run: cmake --version

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: ${{ env.NINJA_VER }}

      - name: Install GCC
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-$GCC_VER g++-$GCC_VER
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-$GCC_VER 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-$GCC_VER 100
          sudo mkdir -p /usr/lib/gcc/x86_64-linux-gnu/include/
          sudo ln -s /usr/include/c++/ /usr/lib/gcc/x86_64-linux-gnu/include/c++
          g++ --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run Tests
        run: ctest --preset ${{ matrix.preset }}

  build_and_test_linux_clang:
    name: Build and Test (${{ matrix.preset }})
    strategy:
      fail-fast: false
      matrix:
        preset:
          - dev_ninja_clang_linux
          - release_ninja_clang_linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: ${{ env.CMAKE_VER }}

      - name: CMake version
        run: cmake --version

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
        with:
          version: ${{ env.NINJA_VER }}

      - name: Install LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh $LLVM_VER_UBUNTU all
          sudo update-alternatives --remove-all clang || true
          sudo update-alternatives --remove-all clang-format || true
          sudo update-alternatives \
            --install /usr/bin/clang++ clang++ /usr/bin/clang++-$LLVM_VER_UBUNTU 100 \
            --slave /usr/bin/clang clang /usr/bin/clang-$LLVM_VER_UBUNTU \
            --slave /usr/bin/clang-format clang-format /usr/bin/clang-format-$LLVM_VER_UBUNTU
          sudo update-alternatives --set clang++ /usr/bin/clang++-$LLVM_VER_UBUNTU
          sudo mkdir -p /lib/share
          sudo ln -s /usr/lib/llvm-$LLVM_VER_UBUNTU/share/libc++ /lib/share
          clang++ --version
          clang-format --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install cmake-format
        run: pip install cmake-format

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run Tests
        run: ctest --preset ${{ matrix.preset }}

      # Formatting doesn't vary by build type, so only check it once.
      - name: Check Formatting
        if: matrix.preset == 'dev_ninja_clang_linux'
        run: cmake --build --preset ${{ matrix.preset }} --target clang-format-check

      - name: Check CMake Formatting
        if: matrix.preset == 'dev_ninja_clang_linux'
        run: cmake --build --preset ${{ matrix.preset }} --target cmake-format-check
